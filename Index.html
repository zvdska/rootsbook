<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ROOTS BOOK</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0C;
  --card:#141417;
  --glass:rgba(255,255,255,.07);
  --glass-border:rgba(255,255,255,.12);
  --txt:#F4F4F6;
  --muted:#8E8E96;
  --grad:linear-gradient(90deg,#FF5EA0 0%,#FF8A3D 35%,#FFD23D 65%,#37D5FF 100%);
  --r-lg:28px;
  --r-md:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:'Manrope',system-ui,sans-serif;
  overflow-x:hidden;
}
.screen{display:none;min-height:100vh;animation:fade .25s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

/* ===== HOME ===== */
.home{padding:20px 16px calc(28px + env(safe-area-inset-bottom))}
.home-head{padding:8px 4px 20px}
.eyebrow{
  font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted);font-weight:700;margin-bottom:6px;
}
.home-title{
  font-family:'Unbounded',sans-serif;font-weight:900;font-size:30px;line-height:1.05;
}
.home-title .grad{
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
}
.search{
  margin-top:16px;display:flex;align-items:center;gap:10px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:14px;padding:12px 14px;color:var(--muted);font-size:14px;
}
.search input{
  background:none;border:none;outline:none;color:var(--txt);
  font-family:inherit;font-size:14px;width:100%;
}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
.acard{
  position:relative;border-radius:var(--r-md);overflow:hidden;
  aspect-ratio:3/4;cursor:pointer;border:1px solid var(--glass-border);
  background:var(--card);
}
.acard .ph{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Unbounded',sans-serif;font-weight:900;font-size:52px;
  color:rgba(255,255,255,.14);
}
.acard .ov{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(8,8,10,.92) 0%,rgba(8,8,10,.25) 55%,transparent 100%);
}
.acard .meta{position:absolute;left:12px;right:12px;bottom:12px}
.acard .nm{font-family:'Unbounded',sans-serif;font-weight:700;font-size:15px}
.acard .rl{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600}
.acard:active{transform:scale(.97);transition:transform .1s}

.acard .phimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:grayscale(1) contrast(1.05)}
.heroimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

/* ===== PROFILE ===== */
.profile{position:relative;min-height:100vh}
.hero{
  position:fixed;top:0;left:0;width:100%;height:62vh;min-height:420px;
  overflow:hidden;z-index:0;
}
.hero-media{
  position:absolute;inset:0;will-change:transform,filter;
  transform-origin:center 30%;
}
.hero .dim{
  position:absolute;inset:0;background:#0A0A0C;opacity:0;pointer-events:none;
}
.hero-spacer{
  position:relative;z-index:2;height:62vh;min-height:420px;
  display:flex;align-items:flex-end;
}
.hero .ph{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Unbounded',sans-serif;font-weight:900;font-size:120px;
  color:rgba(255,255,255,.08);
}
.hero .ov{
  position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 4%,rgba(10,10,12,.55) 45%,rgba(10,10,12,.25) 100%);
}
.topbar{
  position:fixed;top:calc(14px + env(safe-area-inset-top));left:14px;right:14px;
  display:flex;justify-content:space-between;align-items:center;z-index:40;
}
.hero-spacer .hero-meta{pointer-events:none}
.hero-spacer .hero-meta .badges{pointer-events:auto}
.chip{
  background:rgba(20,20,24,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);border-radius:999px;
  padding:9px 14px;font-size:13px;font-weight:700;color:var(--txt);
  display:flex;align-items:center;gap:6px;cursor:pointer;
}
.hero-meta{position:relative;width:100%;padding:0 20px 18px;z-index:4}
.pname{
  font-family:'Unbounded',sans-serif;font-weight:900;
  font-size:clamp(34px,9vw,44px);line-height:1.02;letter-spacing:-.01em;
}
.phandle{
  margin-top:8px;font-size:14px;color:var(--muted);font-weight:600;
  display:flex;align-items:center;gap:8px;
}
.badges{display:flex;gap:8px;margin-top:12px}
.bdg{
  width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:var(--glass);border:1px solid var(--glass-border);
  backdrop-filter:blur(10px);cursor:pointer;
}
.bdg svg{width:18px;height:18px;fill:#fff}
.bdg:active{transform:scale(.92);transition:transform .1s}

.body{
  position:relative;z-index:2;background:var(--bg);
  border-radius:30px 30px 0 0;
  padding:26px 20px calc(110px + env(safe-area-inset-bottom));
  box-shadow:0 -18px 40px rgba(0,0,0,.45);
}
.bio{font-size:14.5px;line-height:1.55;color:#C9C9D0}
.stats{
  display:flex;gap:10px;margin-top:18px;
}
.stat{
  flex:1;background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--r-md);padding:14px 8px;text-align:center;
}
.stat b{font-family:'Unbounded',sans-serif;font-weight:700;font-size:19px;display:block}
.stat span{font-size:11px;color:var(--muted);font-weight:600;margin-top:4px;display:block;letter-spacing:.04em}
.sec-t{
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
  font-weight:800;margin:26px 0 12px;
}
.tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{
  background:var(--glass);border:1px solid var(--glass-border);border-radius:999px;
  padding:8px 14px;font-size:12.5px;font-weight:700;color:#D6D6DE;
}
a.tag{text-decoration:none;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
a.tag::after{content:'↗';font-size:11px;opacity:.6}
.releases{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;margin:0 -20px;padding:0 20px}
.releases::-webkit-scrollbar{display:none}
.rel{
  flex:0 0 116px;
}
.rel.clickable{cursor:pointer}
.rel.clickable:active .cov{transform:scale(.95);transition:transform .1s}
.covimg{object-fit:cover}
.rel .cov{
  width:116px;height:116px;border-radius:16px;border:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:center;
  font-family:'Unbounded',sans-serif;font-weight:900;font-size:30px;color:rgba(255,255,255,.18);
}
.rel .rt{font-size:12.5px;font-weight:700;margin-top:8px}
.rel .ry{font-size:11px;color:var(--muted);margin-top:2px}
.comment{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--r-md);padding:14px;display:flex;gap:12px;margin-bottom:10px;
}
.comment .av{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;background:#26262C;
}
.comment p{font-size:13.5px;line-height:1.5;color:#D6D6DE}
.comment .cn{font-size:12px;color:var(--muted);font-weight:700;margin-top:6px}

.article{margin-top:4px}
.article h3{
  font-family:'Unbounded',sans-serif;font-weight:700;font-size:16px;
  margin:24px 0 10px;line-height:1.3;
}
.article h4{
  font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  color:#A8A8B2;margin:18px 0 8px;
}
.article p{font-size:14.5px;line-height:1.6;color:#C9C9D0;margin-bottom:12px}
.article p b, .article li b{color:var(--txt)}
.article em{font-style:italic;color:#D6D6DE}
.article ul{list-style:none;margin-bottom:12px}
.article ul li{
  font-size:14px;line-height:1.55;color:#C9C9D0;
  padding:10px 0 10px 16px;border-left:2px solid rgba(255,255,255,.14);
  margin-bottom:8px;
}
.article ul li b{color:var(--txt)}
.article blockquote{
  position:relative;background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--r-md);padding:16px 16px 16px 20px;margin:16px 0;
  font-size:14px;line-height:1.6;color:#D6D6DE;font-style:italic;
}
.article blockquote::before{
  content:'';position:absolute;left:0;top:14px;bottom:14px;width:3px;
  border-radius:3px;background:var(--grad);
}
.ach{counter-reset:ach;margin-bottom:6px}
.ach .it{
  display:flex;gap:14px;align-items:flex-start;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--r-md);padding:14px;margin-bottom:10px;
}
.ach .num{
  font-family:'Unbounded',sans-serif;font-weight:900;font-size:18px;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
  flex-shrink:0;width:28px;
}
.ach .it p{margin:0;font-size:13.5px}
.ach .it b{color:var(--txt);display:block;margin-bottom:3px;font-size:14px}
.editors{
  margin-top:22px;background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--r-md);padding:14px 16px;
}
.ed-t{
  font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted);font-weight:800;margin-bottom:6px;
}
.ed-names{font-size:13px;font-weight:700;color:#D6D6DE;line-height:1.6}
.followbar{
  position:fixed;left:16px;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));
  z-index:20;display:none;
}
.followbar.show{display:block}
.followbtn{
  width:100%;border:none;border-radius:18px;padding:17px;
  font-family:'Unbounded',sans-serif;font-weight:700;font-size:15px;color:#0A0A0C;
  background:var(--grad);cursor:pointer;
  box-shadow:0 8px 32px rgba(255,110,90,.35);
}
.followbtn.on{
  background:var(--glass);color:var(--txt);
  border:1px solid var(--glass-border);box-shadow:none;
  backdrop-filter:blur(16px);
}
</style>
</head>
<body>

<!-- ================= HOME ================= -->
<div class="screen active" id="scr-home">
  <div class="home">
    <div class="home-head">
      <h1 class="home-title">ROOTS BOOK</h1>
      <div class="search">
        <span>⌕</span>
        <input id="q" placeholder="Search" oninput="renderGrid(this.value)">
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- ================= PROFILE ================= -->
<div class="screen" id="scr-profile">
  <div class="profile">
    <div class="hero" id="p-hero">
      <div class="hero-media" id="p-media">
        <img class="heroimg" id="p-img" alt="" style="display:none">
        <div class="ph" id="p-ph"></div>
      </div>
      <div class="ov"></div>
      <div class="dim" id="p-dim"></div>
    </div>
    <div class="topbar">
      <div class="chip" onclick="goHome()">←&nbsp;Назад</div>
      <div class="chip" id="p-handle-chip"></div>
    </div>
    <div class="hero-spacer">
      <div class="hero-meta">
        <h2 class="pname" id="p-name"></h2>
        <div class="phandle" id="p-handle"></div>

    <div class="body">
      <p class="bio" id="p-bio"></p>
      <div class="stats">
        <div class="stat"><b id="p-fol"></b><span>Подписчики</span></div>
        <div class="stat"><b id="p-folw"></b><span>Прослушивания</span></div>
        <div class="stat"><b id="p-rel"></b><span>Релизы</span></div>
      </div>
      <div id="p-article-wrap" style="display:none">
        <div class="sec-t" style="margin-top:30px">История</div>
        <div class="article" id="p-article"></div>
        <div class="editors">
          <div class="ed-t">Редакция</div>
          <div class="ed-names">Павел Ивушкин · Илья Капустин · Роман Рув · Никита Завадский</div>
        </div>
      </div>
      <div id="p-links-wrap" style="display:none">
        <div class="sec-t">Ссылки</div>
        <div class="tags" id="p-links"></div>
      </div>

        <div class="sec-t">Релизы</div>

      </div>
    </div>
  </div>
</div>

<div class="followbar" id="followbar">
  <button class="followbtn" id="followbtn" onclick="toggleFollow()">Подписаться</button>
</div>

<script>
/* ---- Telegram WebApp init ---- */
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0A0A0C');
  tg.setBackgroundColor('#0A0A0C');
}

<p>Для KJ хип-хоп всегда был чем-то большим, чем просто музыка. Это стиль жизни, который не признает границ и принадлежит каждому. Его путь — классическая история о том, как из дефицита информации и кассет с клипами рождалась целая культура.</p>

<h3>Начало: от народных танцев до Ice-T</h3>
<p>Всё завертелось в студенческие годы, в конце 90-х. Информацию собирали буквально по крупицам:</p>
<ul>
<li><b>Источник стиля:</b> друг Вована ездил по Европе с народными танцами и привозил оттуда заграничные шмотки и кассеты с клипами.</li>
<li><b>Идеал:</b> именно благодаря этим записям у KJ сформировался образ «настоящего рэпера», ориентиром для которого стал Ice-T.</li>
<li><b>Первая тусовка:</b> в сентябре 1995 года KJ попал на легендарную точку возле Главпочтамта, где собирались первые киевские группы — Stadum и Mc Jet.</li>
</ul>

<h3>Эпоха «Зеленых Каштанов»</h3>
<p>Вскоре появились «Зеленые Каштаны» — проект, ставший для столицы культовым. Одним из основателей был Danny Gunn (Денис Ильин), который позже ушел в религию, но на старте успел задать жару.</p>
<blockquote>«Первый состав Каштанов с тусы на Майдане: Danny Gunn, Ice Mfking, Deaf, Hammer, Dirty Madd Face, Renegade, а позже — Snake-E (будущий участник группы "4 Короля")».</blockquote>
<p>Первые минуса ребятам делал DJ Noizzah, который работал с Green Grey. Денег на студию вечно не хватало, поэтому записи были редкостью, зато концертов хватало: в 1996 году группа уже штурмовала In Da House в Харькове и засветилась на Rap Music в Москве.</p>

<h3>Встреча с XL Deluxe и «Западный ветер»</h3>
<p>В 1999 году на Арке Дружбы Народов произошло историческое знакомство с Alex XL (XL Deluxe). В то время Лёша был ещё школьником-баскетболистом, который смотрел на «Каштанов» как на богов.</p>
<p>Их объединил трек «Западный ветер». KJ сочинил его под минус Scarface, но понял, что в одиночку не вытягивает три куплета по дыханию. Он делегировал часть текста XL — и так родился дуэт, который вскоре услышала вся страна.</p>

<h3>Главные достижения</h3>
<div class="ach">
<div class="it"><div class="num">01</div><p><b>Первый хит</b>Трек «Палач» (1997), записанный за скромные 20–30 долларов, разлетелся по пиратским сборникам вместе с попсой.</p></div>
<div class="it"><div class="num">02</div><p><b>Прорыв на ТВ</b>В 2002 году вышел клип на трек «Киевские красотки» — одно из первых рэп-видео в ротации канала М1.</p></div>
<div class="it"><div class="num">03</div><p><b>Альбом</b>В 2003 году на профессиональной студии «Комора» был записан альбом «Мир в котором ты живешь».</p></div>
<div class="it"><div class="num">04</div><p><b>Гастроли</b>В начале 2000-х группа выступала по 3–4 раза в месяц на хип-хоп тусовках по всей Украине.</p></div>
</div>

<h3>Финал эпохи</h3>
<p>История группы «Зеленые Каштаны» завершилась в 2005 году громким выступлением на Майдане в рамках тура «Сармат хип-хоп». После этого пути участников разошлись: XL Deluxe ушел в клубный промоушен, а Вован устроился работать в ресторан, хотя оба продолжали выпускать сольный материал вплоть до 2017 года.</p>
<p>KJ остался в истории как человек, который делал рэп не ради денег (которых тогда в индустрии почти не было), а ради чистого кайфа и «развлечения».</p>

<li>Регги-трек <b>«Делай это снова»</b>.</li>
<li>Хиты <b>«Титры»</b> (с Kishe) и <b>«Baby Boy»</b> (с Ритой Ри и Джиганом).</li>
<li><b>Гимн БК «Киев»</b>, ставший визитной карточкой баскетбольных матчей столицы.</li>
</ul>
<p>Сегодня XL Deluxe вспоминают не только как артиста, но и как человека, который «дал дорогу» многим молодым коллективам. Как вспоминает Паша ПМ (Роллікс), именно благодаря вечеринкам Алекса многие группы впервые заявили о себе на большой сцене.</p>
`,
    rels:[],
    comments:[],
    links:[]
  }
];
/*DATA-END*/

let following = new Set();
let current = null;

function initials(name){ return name.slice(0,2).toUpperCase(); }

function renderGrid(filter=''){
  const f = filter.trim().toLowerCase();
  const g = document.getElementById('grid');
  g.innerHTML = ARTISTS
    .filter(a => !f || a.name.toLowerCase().includes(f) || a.tags.join(' ').includes(f) || a.role.toLowerCase().includes(f))
    .map(a => `
    <div class="acard" onclick="openProfile('${a.id}')" style="background:radial-gradient(120% 90% at 50% 0%, ${a.hue}26 0%, var(--card) 60%)">
      ${a.photo ? `<img class="phimg" src="${a.photo}" alt="${a.name}" style="object-position:${a.photoPos||'center'}">` : `<div class="ph" style="color:${a.hue}33">${initials(a.name)}</div>`}
      <div class="ov"></div>
      <div class="meta">
        <div class="nm">${a.name}</div>
        <div class="rl">${a.role}</div>
      </div>
    </div>`).join('');
}

function openProfile(id){
  const a = ARTISTS.find(x => x.id === id);
  current = a;
  document.getElementById('p-hero').style.background =
    `radial-gradient(130% 100% at 50% 0%, ${a.hue}30 0%, #121214 70%)`;
  const ph = document.getElementById('p-ph');
  const heroImg = document.getElementById('p-img');
  if (a.photo){
    ph.style.display = 'none';
    heroImg.style.display = 'block';
    heroImg.src = a.photo;
    heroImg.style.objectPosition = a.photoPos || 'center';
  } else {
    heroImg.style.display = 'none';
    ph.style.display = 'flex';
    ph.textContent = initials(a.name);
    ph.style.color = a.hue + '2e';
  }
  document.getElementById('p-name').textContent = a.name;
  document.getElementById('p-handle').textContent = a.handle + ' · ' + a.role;
  document.getElementById('p-handle-chip').textContent = a.handle;
  document.getElementById('p-bio').textContent = a.bio;
  document.getElementById('p-fol').textContent = a.followers;
  document.getElementById('p-folw').textContent = a.following;
  document.getElementById('p-rel').textContent = a.releases;
  const artWrap = document.getElementById('p-article-wrap');
  if (a.article){
    artWrap.style.display = 'block';
    document.getElementById('p-article').innerHTML = a.article;
  } else {
    artWrap.style.display = 'none';
  }
  const linksWrap = document.getElementById('p-links-wrap');
  if (a.links && a.links.length){
    linksWrap.style.display = 'block';
    document.getElementById('p-links').innerHTML = a.links.map(l=>
      `<a class="tag" href="${l.u}" target="_blank" rel="noopener">${l.t}</a>`).join('');
  } else {
    linksWrap.style.display = 'none';
  }
  document.getElementById('p-rels-wrap').style.display = a.rels.length ? 'block' : 'none';
  document.getElementById('p-rels').innerHTML = a.rels.map(r=>`
    <div class="rel${r.link ? ' clickable' : ''}" ${r.link ? `onclick="openRelease('${r.link}')"` : ''}>
      ${r.cov
        ? `<img class="cov covimg" src="${r.cov}" alt="${r.t}">`
        : `<div class="cov" style="background:linear-gradient(135deg, ${a.hue}33, #1A1A1F)">♪</div>`}
      <div class="rt">${r.t}</div><div class="ry">${r.y}</div>
    </div>`).join('');
  updateFollowBtn();
  switchScreen('scr-profile');
  media.style.transform = 'scale(1)';
  media.style.filter = 'grayscale(1) contrast(1.05)';
  dim.style.opacity = 0;
  document.getElementById('followbar').classList.add('show');
  if (tg?.BackButton){ tg.BackButton.show(); tg.BackButton.onClick(goHome); }
  window.scrollTo(0,0);
}

function goHome(){
  window.scrollTo(0,0);
  switchScreen('scr-home');
  document.getElementById('followbar').classList.remove('show');
  if (tg?.BackButton) tg.BackButton.hide();
}

function switchScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateFollowBtn(){
  const btn = document.getElementById('followbtn');
  const on = following.has(current.id);
  btn.textContent = on ? 'Вы подписаны ✓' : 'Подписаться';
  btn.classList.toggle('on', on);
}

function openRelease(url){
  if (!url) return;
  if (tg?.openLink) tg.openLink(url);
  else window.open(url, '_blank');
}

function toggleFollow(){
  if (following.has(current.id)) following.delete(current.id);
  else {
    following.add(current.id);
    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  }
  updateFollowBtn();
}

/* ---- Scroll effect: фото на месте, блюр + затемнение + зум ---- */
const media = document.getElementById('p-media');
const dim = document.getElementById('p-dim');
const heroEl = document.getElementById('p-hero');
let ticking = false;

function applyScrollFx(){
  ticking = false;
  if (!document.getElementById('scr-profile').classList.contains('active')) return;
  const h = heroEl.offsetHeight || 1;
  const p = Math.min(Math.max(window.scrollY / (h * 0.75), 0), 1);
  media.style.transform = `scale(${(1 + p * 0.12).toFixed(4)})`;
  media.style.filter = `grayscale(1) contrast(1.05) blur(${(p * 16).toFixed(1)}px) brightness(${(1 - p * 0.35).toFixed(3)})`;
  dim.style.opacity = (p * 0.45).toFixed(3);
}

window.addEventListener('scroll', () => {
  if (!ticking){ ticking = true; requestAnimationFrame(applyScrollFx); }
}, { passive:true });

renderGrid();

/* ---- Внешние данные: data.json лежит рядом с приложением (из админки) ---- */
fetch('data.json', {cache:'no-store'})
  .then(r => r.ok ? r.json() : null)
  .then(d => {
    if (d && Array.isArray(d.artists) && d.artists.length){
      ARTISTS = d.artists;
      renderGrid(document.getElementById('q').value || '');
    }
  })
  .catch(() => {});
</script>
</body>
